# BRIEF: Validate integrity of all scripts using SHA-256 registry
# NOTE: Ensures no unauthorized script modifications

name: Validate Script Integrity

# MokoStandards Policy Compliance:
# - File formatting: Enforces organizational coding standards
# - Reference: docs/policy/file-formatting.md

# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                         WORKFLOW FLOW DIAGRAM                            в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
#   TRIGGER: PR, Push to main, Manual
#        в”Ӯ
#        в–ј
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ Load Registry    в”Ӯ
#   в”Ӯ (.script-        в”Ӯ
#   в”Ӯ  registry.json)  в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#        в”Ӯ
#        в–ј
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ Validate ALL     в”Ӯ
#   в”Ӯ Scripts against  в”Ӯ
#   в”Ӯ Registry         в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#        в”Ӯ
#        в”ңв”Җв”Җв”Җ Pass в”Җв”Җв”Җв”Җв”Җв”Җв–ә вң… Success
#        в”Ӯ
#        в””в”Җв”Җв”Җ Fail в”Җв”Җв”Җв”Җв”Җв”Җв–ә Report & Fail

on:
  pull_request:
    branches:
      - main
    paths:
      - 'api/**/*.php'
  push:
    branches:
      - main
    paths:
      - 'api/**/*.php'
  workflow_dispatch:
    inputs:
      priority:
        description: 'Check only scripts of specified priority'
        required: false
        type: choice
        options:
          - all
          - critical
          - high
        default: 'all'
      strict:
        description: 'Fail on any discrepancies'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-scripts:
    name: Validate Script Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: json, mbstring
          tools: composer
          coverage: none

      - name: Install API Package
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_TOKEN }}"}}'

      - name: Check if registry exists
        id: check_registry
        run: |
          if [ -f "api/.script-registry.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "вң… Registry found" >> $GITHUB_STEP_SUMMARY
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "вҡ пёҸ Registry not found - will generate" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate registry if missing
        if: steps.check_registry.outputs.exists == 'false'
        run: |
          echo "## рҹ”җ Generating Script Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          php api/maintenance/update_sha_hashes.php --dry-run --verbose | tee /tmp/registry_gen.log
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat /tmp/registry_gen.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Validate critical scripts
        id: validate_critical
        run: |
          set +e
          echo "## рҹ”җ Script Integrity Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Critical Priority Scripts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          php api/maintenance/update_sha_hashes.php --dry-run --verbose | tee /tmp/validate_critical.log

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat /tmp/validate_critical.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          exit $EXIT_CODE

      - name: Validate high priority scripts
        if: always()
        id: validate_high
        run: |
          set +e
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### High Priority Scripts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          php api/maintenance/update_sha_hashes.php --dry-run --verbose | tee /tmp/validate_high.log

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat /tmp/validate_high.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          exit $EXIT_CODE

      - name: Validate all scripts (full check)
        if: always() && github.event.inputs.priority == 'all'
        id: validate_all
        run: |
          set +e
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All Scripts (Full Validation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          STRICT_FLAG=""
          if [ "${{ github.event.inputs.strict }}" = "true" ]; then
            STRICT_FLAG="--strict"
          fi

          php api/maintenance/update_sha_hashes.php --dry-run --verbose | tee /tmp/validate_all.log

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat /tmp/validate_all.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          exit $EXIT_CODE

      - name: Generate report
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## рҹ“Ҡ Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CRITICAL_EXIT="${{ steps.validate_critical.outputs.exit_code }}"
          HIGH_EXIT="${{ steps.validate_high.outputs.exit_code }}"
          ALL_EXIT="${{ steps.validate_all.outputs.exit_code }}"

          if [ "$CRITICAL_EXIT" = "0" ]; then
            echo "- вң… **Critical scripts**: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- вқҢ **Critical scripts**: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$HIGH_EXIT" = "0" ]; then
            echo "- вң… **High priority scripts**: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- вқҢ **High priority scripts**: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$ALL_EXIT" ]; then
            if [ "$ALL_EXIT" = "0" ]; then
              echo "- вң… **All scripts**: PASSED" >> $GITHUB_STEP_SUMMARY
            else
              echo "- вҡ пёҸ **All scripts**: WARNINGS" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### рҹ”§ If Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If changes are legitimate:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Update the registry to reflect current state" >> $GITHUB_STEP_SUMMARY
          echo "php api/maintenance/update_sha_hashes.php --verbose" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If changes are NOT authorized:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Restore scripts from last known good state" >> $GITHUB_STEP_SUMMARY
          echo "git checkout HEAD -- api/" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical scripts invalid
        if: steps.validate_critical.outputs.exit_code != '0'
        run: |
          echo "вқҢ Critical script validation failed"
          exit 1
