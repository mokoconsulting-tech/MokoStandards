name: Validate Joomla Project

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  validate:
    name: Validate Joomla Project
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout MokoStandards
        uses: actions/checkout@v4
        with:
          repository: mokoshalb/MokoStandards
          path: .moko-standards
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, json, fileinfo, zip

      - name: Install MokoStandards dependencies
        working-directory: .moko-standards
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Joomla validation
        id: validate
        run: |
          php .moko-standards/api/plugin_validate.php \
            --project-path . \
            --project-type joomla \
            --json > validation-results.json
          
          # Display results
          cat validation-results.json
          
          # Check if valid
          if jq -e '.valid == false' validation-results.json > /dev/null; then
            echo "::error::Project validation failed"
            exit 1
          fi

      - name: Run health check
        id: health
        run: |
          php .moko-standards/api/plugin_health_check.php \
            --project-path . \
            --project-type joomla \
            --json > health-results.json
          
          cat health-results.json
          
          # Check health score
          SCORE=$(jq -r '.score' health-results.json)
          echo "Health Score: $SCORE/100"
          
          if [ "$SCORE" -lt 70 ]; then
            echo "::warning::Health score is below 70"
          fi

      - name: Collect metrics
        id: metrics
        run: |
          php .moko-standards/api/plugin_metrics.php \
            --project-path . \
            --project-type joomla \
            --json > metrics-results.json
          
          cat metrics-results.json

      - name: Check release readiness
        id: readiness
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          php .moko-standards/api/plugin_readiness.php \
            --project-path . \
            --project-type joomla \
            --json > readiness-results.json
          
          cat readiness-results.json
          
          if jq -e '.ready == false' readiness-results.json > /dev/null; then
            echo "::warning::Project is not ready for release"
            jq -r '.blockers[]' readiness-results.json | while read blocker; do
              echo "::warning::Blocker: $blocker"
            done
          fi

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: joomla-validation-results
          path: |
            validation-results.json
            health-results.json
            metrics-results.json
            readiness-results.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 📊 Joomla Project Validation Results\n\n';
            
            // Add validation results
            if (fs.existsSync('validation-results.json')) {
              const validation = JSON.parse(fs.readFileSync('validation-results.json', 'utf8'));
              const status = validation.valid ? '✅ VALID' : '❌ INVALID';
              comment += `### Validation: ${status}\n`;
              comment += `**Score:** ${validation.score}/100\n\n`;
              
              if (validation.errors && validation.errors.length > 0) {
                comment += '**Errors:**\n';
                validation.errors.forEach(err => {
                  const msg = typeof err === 'object' ? err.message : err;
                  comment += `- ❌ ${msg}\n`;
                });
                comment += '\n';
              }
              
              if (validation.warnings && validation.warnings.length > 0) {
                comment += '**Warnings:**\n';
                validation.warnings.forEach(warn => {
                  const msg = typeof warn === 'object' ? warn.message : warn;
                  comment += `- ⚠️ ${msg}\n`;
                });
                comment += '\n';
              }
            }
            
            // Add health check results
            if (fs.existsSync('health-results.json')) {
              const health = JSON.parse(fs.readFileSync('health-results.json', 'utf8'));
              const status = health.healthy ? '✅ HEALTHY' : '⚠️ UNHEALTHY';
              comment += `### Health Check: ${status}\n`;
              comment += `**Score:** ${health.score}/100\n\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
