# FILE INFORMATION
# DEFGROUP: MokoStandards.Workflows
# INGROUP: MokoStandards.Automation
# REPO: https://github.com/mokoconsulting-tech/MokoStandards
# PATH: /.github/workflows/reserve-dolibarr-module-id.yml
# VERSION: 04.00.03
# BRIEF: Reserves a Dolibarr module ID and updates registry table
# NOTE: Repository URL automatically constructed from repo name with mokoconsulting-tech org; push to remote is optional

name: Reserve Dolibarr Module ID

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Repository name (e.g., MokoDoliExample)'
        required: true
        type: string
      module_id:
        description: 'Specific module ID to assign (optional, auto-assigns if not provided)'
        required: false
        type: number
      push_to_remote:
        description: 'Scan remote repository for module ID references, update them, and open a PR with the new ID'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  reserve:
    name: Reserve Dolibarr Module ID
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract module name from input
        id: extract_name
        run: |
          # Use the repo_name provided as input
          MODULE_NAME="${{ github.event.inputs.repo_name }}"
          REPO_URL="https://github.com/mokoconsulting-tech/$MODULE_NAME"

          echo "📦 Repository name: $MODULE_NAME"
          echo "🔗 Repository URL: $REPO_URL"
          echo "module_name=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT

      - name: Determine module ID
        id: find_id
        env:
          MANUAL_ID: ${{ github.event.inputs.module_id }}
        run: |
          REGISTRY_FILE="docs/development/crm/module-registry.md"

          if [ -n "$MANUAL_ID" ]; then
            # Manual ID provided
            MODULE_ID="$MANUAL_ID"
            echo "🔢 Using manually specified module ID: $MODULE_ID"

            # Validate it's in the correct range
            if [ "$MODULE_ID" -lt 185051 ] || [ "$MODULE_ID" -gt 185099 ]; then
              echo "❌ Error: Module ID must be in the Moko Consulting reserved range 185051-185099"
              echo "ℹ️  Check the registry for available IDs: https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md"
              exit 1
            fi
          else
            # Auto-assign next available ID
            echo "🔍 Scanning registry for next available module ID..."

            # Extract all reserved module IDs from the full Moko Consulting range (185051-185099)
            USED_IDS=$(grep -oP '(?<=\| )1850(5[1-9]|6[0-9]|[7-8][0-9]|9[0-9])(?= \|)' "$REGISTRY_FILE" | sort -n || true)

            echo "Used IDs in Moko Consulting reserved range (185051-185099):"
            echo "$USED_IDS"

            # Find the first available ID across the full reserved range
            MODULE_ID=""
            for id in $(seq 185051 185099); do
              if ! echo "$USED_IDS" | grep -q "^$id$"; then
                MODULE_ID=$id
                break
              fi
            done

            if [ -z "$MODULE_ID" ]; then
              echo "❌ Error: No available module IDs in the Moko Consulting reserved range (185051-185099)"
              echo "ℹ️  Contact the CRM Development Lead or see the registry: https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md"
              exit 1
            fi

            echo "✅ Next available module ID: $MODULE_ID"
          fi

          echo "module_id=$MODULE_ID" >> $GITHUB_OUTPUT

      - name: Check for ID conflicts
        env:
          MODULE_ID: ${{ steps.find_id.outputs.module_id }}
        run: |
          REGISTRY_FILE="docs/development/crm/module-registry.md"

          echo "🔍 Checking for ID conflicts..."

          if grep -q "| $MODULE_ID |" "$REGISTRY_FILE"; then
            echo "❌ Error: Module ID $MODULE_ID is already in use!"
            exit 1
          fi

          echo "✅ No conflicts detected for module ID $MODULE_ID"

      - name: Update module registry table
        id: update_registry
        env:
          MODULE_NAME: ${{ steps.extract_name.outputs.module_name }}
          MODULE_ID: ${{ steps.find_id.outputs.module_id }}
          REPO_URL: ${{ steps.extract_name.outputs.repo_url }}
        run: |
          REGISTRY_FILE="docs/development/crm/module-registry.md"

          echo "📝 Updating module registry table..."

          # Generate simple description from module name
          DESCRIPTION="Dolibarr module $MODULE_NAME"

          # Find the line with "Available for Assignment"
          LINE_NUM=$(grep -n "| Available for Assignment |" "$REGISTRY_FILE" | cut -d: -f1)

          if [ -z "$LINE_NUM" ]; then
            echo "❌ Error: Could not find 'Available for Assignment' line in registry"
            exit 1
          fi

          # Create new entry
          NEW_ENTRY="| $MODULE_NAME | $MODULE_ID | Reserved | $DESCRIPTION | $REPO_URL |"

          # Insert the new entry before "Available for Assignment" line
          sed -i "${LINE_NUM}i\\${NEW_ENTRY}" "$REGISTRY_FILE"

          echo "✅ Registry updated with:"
          echo "$NEW_ENTRY"

      - name: Update override.config.tf to protect workflow
        run: |
          OVERRIDE_FILE="override.config.tf"
          WORKFLOW_FILE=".github/workflows/reserve-dolibarr-module-id.yml"

          echo "🔧 Updating override.config.tf to protect workflow file..."

          # Check if workflow is already protected
          if grep -q "$WORKFLOW_FILE" "$OVERRIDE_FILE"; then
            echo "✅ Workflow file is already protected in override file"
          else
            # Find the line number for insertion point
            LINE_NUM=$(grep -n "# Keep MokoStandards-specific workflows" "$OVERRIDE_FILE" | head -1 | cut -d: -f1)

            if [ -z "$LINE_NUM" ]; then
              echo "⚠️ Could not find insertion point in $OVERRIDE_FILE"
              echo "Skipping override file update"
            else
              # Create the new entry lines
              printf "    {\n" > /tmp/workflow_entry.txt
              printf "      path   = \"%s\"\n" "$WORKFLOW_FILE" >> /tmp/workflow_entry.txt
              printf "      reason = \"Dolibarr module ID reservation workflow\"\n" >> /tmp/workflow_entry.txt
              printf "    },\n" >> /tmp/workflow_entry.txt

              # Insert after the comment line
              head -n $LINE_NUM "$OVERRIDE_FILE" > /tmp/override_new.tf
              cat /tmp/workflow_entry.txt >> /tmp/override_new.tf
              tail -n +$((LINE_NUM + 1)) "$OVERRIDE_FILE" >> /tmp/override_new.tf

              mv /tmp/override_new.tf "$OVERRIDE_FILE"

              echo "✅ Updated $OVERRIDE_FILE to protect workflow file"
            fi
          fi

      - name: Create branch and commit changes
        id: commit
        env:
          MODULE_ID: ${{ steps.find_id.outputs.module_id }}
          MODULE_NAME: ${{ steps.extract_name.outputs.module_name }}
        run: |
          BRANCH_NAME="reserve-module-id/$MODULE_ID"

          echo "🔀 Creating branch: $BRANCH_NAME"
          git checkout -b "$BRANCH_NAME"

          echo "📦 Committing changes..."
          git add docs/development/crm/module-registry.md
          git add override.config.tf

          # Create commit message
          printf "Reserve Dolibarr module ID %s for %s\n\n" "$MODULE_ID" "$MODULE_NAME" > /tmp/commit_msg.txt
          printf "Module name: %s\n" "$MODULE_NAME" >> /tmp/commit_msg.txt
          printf "Module ID: %s\n\n" "$MODULE_ID" >> /tmp/commit_msg.txt
          printf "This PR reserves module ID %s from the Moko Consulting reserved range.\n\n" "$MODULE_ID" >> /tmp/commit_msg.txt
          printf "Updates in this PR:\n" >> /tmp/commit_msg.txt
          printf -- "- Module registry in docs/development/crm/module-registry.md\n" >> /tmp/commit_msg.txt
          printf -- "- override.config.tf protection for workflow\n\n" >> /tmp/commit_msg.txt
          printf "Automated via reserve-dolibarr-module-id workflow.\n" >> /tmp/commit_msg.txt

          git commit -F /tmp/commit_msg.txt

          echo "⬆️ Pushing branch..."
          git push origin "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: actions/github-script@v8
        id: create_pr
        env:
          MODULE_NAME: ${{ steps.extract_name.outputs.module_name }}
          MODULE_ID: ${{ steps.find_id.outputs.module_id }}
          REPO_URL: ${{ steps.extract_name.outputs.repo_url }}
          BRANCH_NAME: ${{ steps.commit.outputs.branch_name }}
          PUSH_TO_REMOTE: ${{ github.event.inputs.push_to_remote }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const moduleId = process.env.MODULE_ID;
            const moduleName = process.env.MODULE_NAME;
            const repoUrl = process.env.REPO_URL;
            const branchName = process.env.BRANCH_NAME;
            const pushToRemote = process.env.PUSH_TO_REMOTE === 'true';
            const description = `Dolibarr module ${moduleName}`;

            const title = `Reserve Dolibarr Module ID ${moduleId} for ${moduleName}`;

            let nextSteps = `### Next Steps
            1. This PR was created automatically by the GitHub Actions workflow
            2. Review the PR to confirm the reservation details are correct
            3. Approve if the reservation is appropriate
            4. Merge to officially reserve the module ID`;

            if (pushToRemote) {
              nextSteps += `\n            5. Review and merge the remote PR that was automatically opened in ${repoUrl}`;
            } else {
              nextSteps += `\n            5. Manually create \`src/DOLIBARR_MODULE_ID.txt\` in ${repoUrl} if needed`;
            }

            const body = `## Module ID Reservation Request

            **Module Name:** ${moduleName}
            **Module ID:** ${moduleId}
            **Description:** ${description}
            **Repository:** ${repoUrl}
            **Push to Remote:** ${pushToRemote ? 'Yes' : 'No'}

            ---

            This PR reserves module ID **${moduleId}** from the Moko Consulting reserved range for the **${moduleName}** module.

            ### Changes
            - ✅ Updated module registry table in \`docs/development/crm/module-registry.md\`
            - ✅ Updated \`override.config.tf\` to protect workflow file
            - ✅ Reserved ID: **${moduleId}**
            - ✅ Status: **Reserved**

            ${nextSteps}

            ### Policy Compliance
            - Follows module ID reservation process per [Module Registry](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md#module-id-reservation-process)
            - Module ID verified against the [Moko Consulting Module Registry](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md)

            ### Documentation
            - **[Module Registry](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md)** - Official module number registry
            - **[Development Guide](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/guide/crm/dolibarr-development-guide.md)** - CRM development guide
            - **[Development Standards](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/policy/crm/development-standards.md)** - Coding standards

            ---

            🤖 _This PR was automatically created by the [reserve-dolibarr-module-id](.github/workflows/reserve-dolibarr-module-id.yml) workflow._`;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              head: branchName,
              base: 'main'
            });

            console.log(`✅ Pull request created: ${pr.data.html_url}`);
            core.setOutput('pr_url', pr.data.html_url);
            core.setOutput('pr_number', pr.data.number);

            return pr.data.html_url;

      - name: Add labels to PR
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['dolibarr', 'module-id-reservation', 'automated']
            });

            console.log('✅ Labels added to PR');

      - name: Push to remote repository
        if: ${{ github.event.inputs.push_to_remote == 'true' }}
        id: push_remote
        env:
          MODULE_ID: ${{ steps.find_id.outputs.module_id }}
          MODULE_NAME: ${{ steps.extract_name.outputs.module_name }}
          REMOTE_REPO: ${{ steps.extract_name.outputs.repo_url }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🚀 Opening module ID update PR in remote repository..."

          # Create a temporary directory for the remote repo
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"

          # Clone the remote repository using GH_TOKEN for authentication
          echo "📥 Cloning remote repository..."
          git clone "https://x-access-token:${GH_TOKEN}@github.com/mokoconsulting-tech/${MODULE_NAME}" repo
          cd repo

          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a new branch for the changes
          REMOTE_BRANCH="reserve-module-id/${MODULE_ID}"
          echo "🔀 Creating branch: $REMOTE_BRANCH"
          git checkout -b "$REMOTE_BRANCH"

          # Create src directory if it doesn't exist
          mkdir -p src

          # Create DOLIBARR_MODULE_ID.txt file
          MODULE_ID_FILE="src/DOLIBARR_MODULE_ID.txt"
          echo "DOLIBARR_MODULE_ID=$MODULE_ID" > "$MODULE_ID_FILE"
          echo "" >> "$MODULE_ID_FILE"
          echo "This module ID has been officially reserved in MokoStandards." >> "$MODULE_ID_FILE"
          echo "" >> "$MODULE_ID_FILE"
          echo "Module Name: $MODULE_NAME" >> "$MODULE_ID_FILE"
          echo "Module ID: $MODULE_ID" >> "$MODULE_ID_FILE"
          echo "Reserved Range: 185051-185099 (Moko Consulting)" >> "$MODULE_ID_FILE"
          echo "Description: Dolibarr module $MODULE_NAME" >> "$MODULE_ID_FILE"
          echo "" >> "$MODULE_ID_FILE"
          echo "Reserved: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$MODULE_ID_FILE"
          echo "" >> "$MODULE_ID_FILE"
          echo "DO NOT CHANGE THIS ID!" >> "$MODULE_ID_FILE"
          echo "" >> "$MODULE_ID_FILE"
          echo "This ID is registered in the MokoStandards module registry:" >> "$MODULE_ID_FILE"
          echo "https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md" >> "$MODULE_ID_FILE"
          git add "$MODULE_ID_FILE"
          echo "✅ Created $MODULE_ID_FILE"

          # Scan PHP files for $this->numero = <digits> and update with the reserved ID
          echo "🔍 Scanning PHP files for \$this->numero patterns..."
          UPDATED_PHP=0
          while IFS= read -r file; do
            perl -i -pe 's/(\$this->numero\s*=\s*)\d+/$1'"$MODULE_ID"'/' "$file"
            git add "$file"
            echo "  Updated: $file"
            UPDATED_PHP=$((UPDATED_PHP + 1))
          done < <(grep -rl '$this->numero' . --include="*.php" 2>/dev/null || true)
          echo "✅ Updated $UPDATED_PHP PHP file(s) with \$this->numero = $MODULE_ID"

          # Scan other files for DOLIBARR_MODULE_ID=<digits> (skip the file we just created)
          echo "🔍 Scanning for DOLIBARR_MODULE_ID= pattern in other files..."
          UPDATED_OTHER=0
          while IFS= read -r file; do
            if [[ "$file" != "./$MODULE_ID_FILE" ]]; then
              perl -i -pe 's/(DOLIBARR_MODULE_ID=)\d+/$1'"$MODULE_ID"'/' "$file"
              git add "$file"
              echo "  Updated: $file"
              UPDATED_OTHER=$((UPDATED_OTHER + 1))
            fi
          done < <(grep -rl 'DOLIBARR_MODULE_ID=' . 2>/dev/null || true)
          echo "✅ Updated $UPDATED_OTHER other file(s) with DOLIBARR_MODULE_ID=$MODULE_ID"

          # Commit all changes
          printf "feat: set Dolibarr module ID to %s\n\n" "$MODULE_ID" > /tmp/remote_commit.txt
          printf "Module: %s\n" "$MODULE_NAME" >> /tmp/remote_commit.txt
          printf "ID: %s\n\n" "$MODULE_ID" >> /tmp/remote_commit.txt
          printf "Changes:\n" >> /tmp/remote_commit.txt
          printf -- "- Added src/DOLIBARR_MODULE_ID.txt with reserved module ID\n" >> /tmp/remote_commit.txt
          printf -- "- Updated \$this->numero in PHP module descriptor(s) to %s\n" "$MODULE_ID" >> /tmp/remote_commit.txt
          printf -- "- Updated any existing DOLIBARR_MODULE_ID references to %s\n\n" "$MODULE_ID" >> /tmp/remote_commit.txt
          printf "This ID is officially reserved in MokoStandards.\n" >> /tmp/remote_commit.txt
          printf "See https://github.com/mokoconsulting-tech/MokoStandards\n\n" >> /tmp/remote_commit.txt
          printf "DO NOT change the module ID!\n" >> /tmp/remote_commit.txt
          git commit -F /tmp/remote_commit.txt

          # Push the new branch to the remote repository
          echo "📤 Pushing branch $REMOTE_BRANCH..."
          git push origin "$REMOTE_BRANCH"

          # Create a PR in the remote repository via GitHub CLI
          echo "📬 Creating PR in remote repository..."
          REMOTE_PR_URL=$(gh pr create \
            --repo "mokoconsulting-tech/${MODULE_NAME}" \
            --head "$REMOTE_BRANCH" \
            --base "main" \
            --title "feat: set Dolibarr module ID to ${MODULE_ID} for ${MODULE_NAME}" \
            --body "## Module ID Assignment

          This PR sets the Dolibarr module ID for **${MODULE_NAME}** to **${MODULE_ID}**.

          The ID has been officially reserved in the MokoStandards module registry.

          ### Changes
          - Added \`src/DOLIBARR_MODULE_ID.txt\` with the reserved module ID
          - Updated \`\$this->numero\` in PHP module descriptor(s) to \`${MODULE_ID}\`
          - Updated any other \`DOLIBARR_MODULE_ID\` references to \`${MODULE_ID}\`

          ### Registry
          - [MokoStandards Module Registry](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/docs/development/crm/module-registry.md)

          ---

          🤖 _Automatically created by the [reserve-dolibarr-module-id](https://github.com/mokoconsulting-tech/MokoStandards/blob/main/.github/workflows/reserve-dolibarr-module-id.yml) workflow._")

          echo "✅ Remote PR created: $REMOTE_PR_URL"
          echo "remote_pr_url=$REMOTE_PR_URL" >> $GITHUB_OUTPUT

          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"

      - name: Output summary
        env:
          MODULE_NAME: ${{ steps.extract_name.outputs.module_name }}
          MODULE_ID: ${{ steps.find_id.outputs.module_id }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          REPO_URL: ${{ steps.extract_name.outputs.repo_url }}
          PUSH_TO_REMOTE: ${{ github.event.inputs.push_to_remote }}
          REMOTE_PR_URL: ${{ steps.push_remote.outputs.remote_pr_url }}
        run: |
          echo "## 🎉 Module ID Reservation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Module Name:** $MODULE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Reserved ID:** $MODULE_ID" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** $REPO_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Request:** $PR_URL" >> $GITHUB_STEP_SUMMARY
          if [ "$PUSH_TO_REMOTE" = "true" ]; then
            echo "**Remote Push:** ✅ Enabled" >> $GITHUB_STEP_SUMMARY
            echo "**Remote PR:** $REMOTE_PR_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Remote Push:** ⏭️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. This PR was created automatically by the GitHub Actions workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Review the PR to confirm the reservation details are correct" >> $GITHUB_STEP_SUMMARY
          echo "3. Get approval from CRM Development Lead" >> $GITHUB_STEP_SUMMARY
          echo "4. Merge the PR to officially reserve the module ID" >> $GITHUB_STEP_SUMMARY
          if [ "$PUSH_TO_REMOTE" = "true" ]; then
            echo "5. Review and merge the remote PR: $REMOTE_PR_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "5. Manually create src/DOLIBARR_MODULE_ID.txt in $REPO_URL if needed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Generated by reserve-dolibarr-module-id workflow v04.00.03_" >> $GITHUB_STEP_SUMMARY
