# FILE INFORMATION
# DEFGROUP: GitHub.Workflows.Deploy
# INGROUP: MokoStandards.Deploy
# REPO: https://github.com/mokoconsulting-tech/MokoStandards
# PATH: /.github/workflows/deploy-dev.yml
# VERSION: 04.00.15
# BRIEF: Reusable workflow — deploy a repo's src/ directory to the dev SFTP server
# NOTE: Called by governed repos via:
#       uses: mokoconsulting-tech/MokoStandards/.github/workflows/deploy-dev.yml@main

name: Deploy — Dev

on:
  workflow_call:
    inputs:
      src_dir:
        description: 'Sub-directory to upload (default: src)'
        required: false
        type: string
        default: 'src'
      dry_run:
        description: 'Preview only — no files will be uploaded'
        required: false
        type: boolean
        default: false
      php_version:
        description: 'PHP version to use'
        required: false
        type: string
        default: '8.1'
    secrets:
      GH_TOKEN:
        description: 'GitHub PAT with package read access'
        required: true
      SFTP_HOST:
        description: 'Dev SFTP hostname'
        required: true
      SFTP_USER:
        description: 'Dev SFTP username'
        required: true
      SFTP_REMOTE_PATH:
        description: 'Absolute remote path on dev server'
        required: true
      SFTP_KEY:
        description: 'SSH private key file content (PEM or PPK format)'
        required: true
      SFTP_KEY_PASSPHRASE:
        description: 'Passphrase for the SSH private key (leave empty if none)'
        required: false
    outputs:
      exit_code:
        description: 'Script exit code (0 = success)'
        value: ${{ jobs.deploy.outputs.exit_code }}

  workflow_dispatch:
    inputs:
      src_dir:
        description: 'Sub-directory to upload (default: src)'
        required: false
        type: string
        default: 'src'
      dry_run:
        description: 'Preview only — no files will be uploaded'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Dev (${{ inputs.dry_run && 'dry-run' || 'live' }})
    runs-on: ubuntu-latest

    outputs:
      exit_code: ${{ steps.deploy.outputs.exit_code }}

    steps:
      # ── 1. Checkout the calling repository ──────────────────────────────────
      - name: Checkout calling repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: _repo

      # ── 2. Checkout MokoStandards for the deploy script ─────────────────────
      - name: Checkout MokoStandards
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          repository: mokoconsulting-tech/MokoStandards
          token: ${{ secrets.GH_TOKEN }}
          path: _mokostandards

      # ── 3. Set up PHP ────────────────────────────────────────────────────────
      - name: Set up PHP ${{ inputs.php_version }}
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: ${{ inputs.php_version }}
          extensions: json, mbstring, curl
          tools: composer
          coverage: none

      # ── 4. Install Composer dependencies (including phpseclib) ──────────────
      - name: Install Composer dependencies
        working-directory: _mokostandards
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_TOKEN }}"}}'

      # ── 5. Write SSH key to a temporary file ────────────────────────────────
      #      Key content is passed exclusively via env var (never inline in run:)
      - name: Write SSH key
        id: write_key
        run: |
          KEY_FILE="$(mktemp /tmp/sftp_key.XXXXXX)"
          printf '%s' "$SFTP_KEY_CONTENT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "key_file=$KEY_FILE" >> "$GITHUB_OUTPUT"
        env:
          SFTP_KEY_CONTENT: ${{ secrets.SFTP_KEY }}

      # ── 6. Write sftp-config.dev.json from secrets ───────────────────────────
      #      All secret values are interpolated via env vars to prevent injection
      - name: Write sftp-config.dev.json
        run: |
          mkdir -p _repo/scripts/sftp-config
          printf '{\n  "type": "sftp",\n  "host": "%s",\n  "user": "%s",\n  "ssh_key_file": "%s",\n  "port": "22",\n  "remote_path": "%s"\n}\n' \
            "$SFTP_HOST" "$SFTP_USER" "$KEY_FILE" "$SFTP_REMOTE_PATH" \
            > _repo/scripts/sftp-config/sftp-config.dev.json
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
          KEY_FILE: ${{ steps.write_key.outputs.key_file }}

      # ── 7. Preview — always run dry-run first ────────────────────────────────
      - name: Preview deployment (dry-run)
        run: |
          {
            echo "## Deploy Dev — Preview"
            echo '```'
            php _mokostandards/api/deploy/deploy-sftp.php \
              --path _repo \
              --src-dir "$INPUT_SRC_DIR" \
              --env dev \
              --dry-run \
              --verbose 2>&1
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
        env:
          INPUT_SRC_DIR: ${{ inputs.src_dir }}

      # ── 8. Live deploy (skipped when dry_run = true) ─────────────────────────
      - name: Deploy to dev server
        id: deploy
        if: ${{ !inputs.dry_run }}
        run: |
          PASSPHRASE_ARG=()
          if [ -n "$SFTP_KEY_PASSPHRASE" ]; then
            PASSPHRASE_ARG=(--key-passphrase "$SFTP_KEY_PASSPHRASE")
          fi

          set +e
          php _mokostandards/api/deploy/deploy-sftp.php \
            --path _repo \
            --src-dir "$INPUT_SRC_DIR" \
            --env dev \
            "${PASSPHRASE_ARG[@]}" 2>&1
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "✅ Deploy to dev succeeded" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Deploy to dev failed (exit $EXIT_CODE)" >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$EXIT_CODE"
        env:
          INPUT_SRC_DIR: ${{ inputs.src_dir }}
          SFTP_KEY_PASSPHRASE: ${{ secrets.SFTP_KEY_PASSPHRASE }}

      # ── 9. Summarize when dry-run only ───────────────────────────────────────
      - name: Record dry-run exit code
        id: dry_exit
        if: ${{ inputs.dry_run }}
        run: |
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Dry-run only — no files were uploaded." >> "$GITHUB_STEP_SUMMARY"

      # ── 10. Always clean up the SSH key ──────────────────────────────────────
      - name: Remove SSH key
        if: always()
        run: rm -f "$KEY_FILE"
        env:
          KEY_FILE: ${{ steps.write_key.outputs.key_file }}
